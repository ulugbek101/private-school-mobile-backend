{% include 'components/_links.html' %} {% load i18n %}

<div
	class="min-h-screen w-full flex items-center justify-center bg-slate-950 px-4"
>
	<form
		action=""
		method="post"
		class="w-full max-w-md rounded-2xl border border-white/10 bg-slate-900/80 p-8 shadow-2xl shadow-indigo-950/40 backdrop-blur"
	>
		{% csrf_token %}

		<div class="mb-6 text-center">
			<h1 class="text-2xl font-bold text-white">{% trans 'Kirish' %}</h1>
			<p class="mt-2 text-sm text-slate-400">
				{% trans 'Telefon raqamingizni kiriting' %}
			</p>
		</div>

		<input
            autocomplete="off"
			type="text"
			name="phone_number"
			placeholder="+998 (XX) XXX-XX-XX"
			class="font-semibold text-slate-400 mb-4 w-full rounded-xl border border-gray-700 bg-gray-800 px-4 py-3 text-slate-100 placeholder:text-slate-500 outline-none transition focus:bg-gray-900"
		/>
        <input
            autocomplete="off"
			type="password"
			name="password"
			placeholder="********"
			class="font-semibold text-slate-400 mb-4 w-full rounded-xl border border-gray-700 bg-gray-800 px-4 py-3 text-slate-100 placeholder:text-slate-500 outline-none transition focus:bg-gray-900"
		/>

		<button
			type="submit"
			class="w-full rounded-xl bg-blue-700 px-4 py-3 font-semibold text-white transition hover:bg-blue-800 focus:outline-none focus:ring-4 focus:ring-blue-500/30 active:bg-blue-900 hover:cursor-pointer active:scale-95"
		>
			{% trans 'Kirish' %}
		</button>
	</form>
</div>
